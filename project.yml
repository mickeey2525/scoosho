name: Scoosho
options:
  bundleIdPrefix: com.mickeey2525
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.0"
settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
targets:
  Scoosho:
    type: application
    platform: macOS
    sources:
      - path: Scoosho/Sources
      - path: Scoosho/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mickeey2525.scoosho
        PRODUCT_NAME: Scoosho
        INFOPLIST_FILE: Scoosho/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Scoosho/Resources/Scoosho.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_HARDENED_RUNTIME: YES
        COMBINE_HIDPI_IMAGES: YES
    entitlements:
      path: Scoosho/Resources/Scoosho.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.files.user-selected.read-write: true
